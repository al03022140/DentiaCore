<svg
  version="1.1"
  id="check_icon"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 100 100"
  width="100"
  height="100"
  xml:space="preserve"
>
  <style type="text/css">
    .st0{
      fill:none;
      stroke:#383838;
      stroke-width:8;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-miterlimit:10;
    }
  </style>

  <g id="check">
    <polyline
      class="st0"
      points="20,60 40,80 80,20"
    />
  </g>
